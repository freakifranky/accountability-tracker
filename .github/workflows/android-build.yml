name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-widget/**'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p android-widget/gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android-widget/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x android-widget/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-widget/**/*.gradle', 'android-widget/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android-widget
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: commit-debug-${{ github.run_number }}
          path: android-widget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
