plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.commit.tracker'
    compileSdk 34

    defaultConfig {
        applicationId "com.commit.tracker"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.browser:browser:1.7.0'          // Custom Tabs / TWA
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0' // TWA
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'      // HTTP for widget
    implementation 'org.json:json:20231013'                  // JSON parsing
}
